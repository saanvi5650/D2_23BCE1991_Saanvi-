<!DOCTYPE html>
<html>
<head>
    <title>Patient Details</title>
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

<div class="navbar">
    <div>Admin Panel</div>
    <div>
        <a href="patients.html">Back</a>
        <a href="../auth/admin-login.html">Logout</a>
    </div>
</div>

<div class="container">

<h2>Patient Overview</h2>

<div class="grid-4">

<div class="card">
    <h3>Heart Rate</h3>
    <p style="font-size:22px;">110 bpm</p>
    <p style="color:#EF4444;">High</p>
</div>

<div class="card">
    <h3>Temperature</h3>
    <p style="font-size:22px;">38.5°C</p>
    <p style="color:#F59E0B;">Warning</p>
</div>

<div class="card">
    <h3>Oxygen</h3>
    <p style="font-size:22px;">92%</p>
    <p style="color:#EF4444;">Low</p>
</div>

<div class="card">
    <h3>Status</h3>
    <p style="font-size:22px;">Critical</p>
</div>

</div>

<br>

<div class="card">
    <h3>Medical Notes</h3>
    <textarea style="width:100%; height:100px;"></textarea>
    <br><br>
    <button class="btn-primary">Save Notes</button>
</div>

</div>
</body>
</html>
